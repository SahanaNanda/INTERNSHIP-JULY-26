<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!--external css, connected to style.css-->
<link rel="stylesheet" href="style.css">
<!--internal css, call specific tag and style-->
    <style>
        h1{
color:aqua;
        }
    </style>
</head>
<body>
    <!--inline, styling inside tags-->
    <p style="color:red">hii hello how are you?</p>
    <h1>Introduction to CSS</h1>
    <h2>EXTERNAL CSS</h2>
</body>
</html>
